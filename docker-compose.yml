services:
  remote-fw:
    build: .
    container_name: remote-fw
    restart: unless-stopped
    init: true
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 200
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    ports:
      - "${REMOTE_FW_BIND:-127.0.0.1}:${REMOTE_FW_PORT:-8090}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
